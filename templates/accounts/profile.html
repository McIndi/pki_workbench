{% extends 'base.html' %}

{% block title %}Profile · PKI Workbench{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Profile</h1>
                <p class="text-body-secondary">Signed in as <strong>{{ request.user.email }}</strong></p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_theme_mode" class="form-label">Theme preference</label>
                        {{ form.theme_mode }}
                    </div>
                    <button type="submit" class="btn btn-primary">Save changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
